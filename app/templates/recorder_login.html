{% extends "base.html" %}
{% block title %}录入员登录{% endblock %}
{% block content %}
<div class="event-page">
<div class="header"><div class="container"><h1>录入员入口</h1></div></div>
<div class="container">
    <div class="card" style="max-width:450px;margin:0 auto;">
        <h2>录入员登录</h2>
        {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" class="form-control" name="name" required placeholder="请输入录入员姓名">
            </div>
            <div class="form-group">
                <label>KEY（四位数字）</label>
                <input type="text" class="form-control" name="key" required placeholder="请输入四位数字KEY" pattern="[0-9]{4}" maxlength="4">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">进入录入</button>
        </form>
    </div>
</div>
</div>
{% endblock %}
